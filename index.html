<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo Hunter System Ultimate - Anime Edition</title>
  <style>
    /* ========== GLOBAL STYLES ========== */
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:#01010a;
      color:white;
      overflow-x:hidden;
    }

    /* PARTICLES BACKGROUND */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(0,255,255,0.15), transparent),
        radial-gradient(2px 2px at 70% 80%, rgba(255,0,255,0.15), transparent),
        radial-gradient(3px 3px at 50% 50%, rgba(255,255,0,0.1), transparent);
      animation: floatBg 35s linear infinite;
      pointer-events:none;
    }
    @keyframes floatBg{
      from{transform: translateY(0);}
      to{transform: translateY(-400px);}
    }

    /* HERO HEADER */
    .hero{
      text-align:center;
      padding:100px 20px 40px;
    }
    .hero h1{
      font-size:3.8rem;
      letter-spacing:2px;
      background:linear-gradient(90deg,#00f0ff,#7c3aed,#ff0080,#ffea00);
      -webkit-background-clip:text;
      color:transparent;
      text-shadow:0 0 35px rgba(0,240,255,.6);
      animation: glowPulse 3s infinite alternate;
    }
    @keyframes glowPulse{
      0%{ text-shadow:0 0 10px rgba(0,240,255,.4);}
      50%{ text-shadow:0 0 25px rgba(124,58,237,.6);}
      100%{ text-shadow:0 0 40px rgba(255,0,255,.9);}
    }
    .hero p{
      opacity:.85;
      font-size:1.3rem;
      text-shadow:0 0 8px #00f0ff;
    }

    /* TOP CARDS GRID */
    .top-section{
      padding:30px 20px;
      text-align:center;
    }
    .top-grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:30px;
    }
    .card{
      width:220px;
      padding:20px;
      border-radius:20px;
      background:linear-gradient(145deg,#060913,#03050a);
      border:2px solid rgba(0,240,255,.35);
      position:relative;
      overflow:hidden;
      transition:.3s;
    }
    .card::before{
      content:'';
      position:absolute;
      inset:-2px;
      background:linear-gradient(120deg,transparent,rgba(0,240,255,.5),transparent);
      opacity:0;
      transition:.3s;
    }
    .card:hover::before{opacity:1;}
    .card:hover{
      transform:translateY(-8px) scale(1.06);
      box-shadow:0 0 35px rgba(0,240,255,.7);
    }
    .rank-big{
      font-size:1.5rem;
      color:#22d3ee;
      font-weight:bold;
      text-shadow:0 0 15px #00ffff;
    }

    /* TABLE STYLES */
    .board{
      max-width:1300px;
      margin:auto;
      padding:40px 20px 100px;
    }
    .search{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:#050814;
      color:white;
      margin-bottom:25px;
      font-size:1rem;
    }
    table{
      width:100%;
      border-collapse:collapse;
      background:rgba(10,20,40,.6);
      backdrop-filter:blur(6px);
      border-radius:12px;
      overflow:hidden;
    }
    th, td{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:center;
    }
    th{
      background:rgba(124,58,237,.2);
      font-size:1rem;
      font-weight:bold;
    }

    /* BADGES TIERS */
    .badge{padding:4px 10px;border-radius:999px;font-weight:bold;font-size:.8rem;}
    .s{background:#ff2b2b;box-shadow:0 0 12px #ff2b2b;}
    .splus{background:#ff4f00;box-shadow:0 0 12px #ff4f00;}
    .ss{background:#7c3aed;box-shadow:0 0 10px #7c3aed;}
    .ssplus{background:#3b82f6;box-shadow:0 0 10px #3b82f6;}
    .sss{background:#00f0ff;box-shadow:0 0 15px #00f0ff;}
    .sssplus{background:#ffea00;box-shadow:0 0 15px #ffea00;}
    .a{background:#7c3aed;}
    .b{background:#3b82f6;}
    .c{background:#555;}

    /* GLITCH EFFECT */
    .glitch{
      color:#00f0ff;
      position:relative;
      font-weight:bold;
      animation:glitchAnim 1.2s infinite;
    }
    @keyframes glitchAnim{
      0%{text-shadow:2px 0 red,-2px 0 blue;}
      50%{text-shadow:-2px 0 red,2px 0 blue;}
      100%{text-shadow:2px 0 red,-2px 0 blue;}
    }

    /* STAT BARS */
    .stat-bar{
      height:10px;
      border-radius:6px;
      background:#111;
      margin:6px 0;
      overflow:hidden;
    }
    .stat-fill{
      height:100%;
      border-radius:6px;
      transition:.5s;
    }
    .force{background:#ff2b2b;}
    .speed{background:#3b82f6;}
    .iq{background:#7c3aed;}
    .tech{background:#ff00ff;}
    .power{background:#ff8000;}
    .vital{background:#00ffff;}
    .resist{background:#00ff00;}
  </style>
</head>
<body>
  <header class="hero">
    <h1>⚔️ NEO HUNTER SYSTEM ULTRA</h1>
    <p>2000+ combattants scannés par l'IA - rang dynamique & futuriste</p>
  </header>

  <section class="top-section">
    <h2>🔥 ÉLITE MONDIALE</h2>
    <div class="top-grid" id="topGrid"></div>
  </section>

  <section class="board">
    <h2>📊 Classement global</h2>
    <input class="search" id="search" placeholder="Scanner un hunter...">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Hunter</th>
          <th>Force</th>
          <th>Vitesse</th>
          <th>IQ</th>
          <th>Technique</th>
          <th>Puissance</th>
          <th>Résistance</th>
          <th>Vitalité</th>
          <th>Tier</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </section>

  <script>
    // ======= GENERATION DES JOUEURS ======
    const p1=["Neo","Dark","Ultra","Shadow","Iron","Cyber","Omega","Alpha","Zero","Nova","Hyper","Quantum","Ghost","Night","Solar"];
    const p2=["Blade","Hunter","Rider","Phantom","Titan","Breaker","Striker","Walker","Sniper","Drifter","Runner","Samurai","Knight","Vortex","Specter"];
    function uniqueName(id){ return p1[id%p1.length]+p2[(id*7)%p2.length]+"_"+id; }
    const players=[];
    function rand(min,max){return Math.floor(Math.random()*(max-min))+min;}
    // ======= AJOUT DES 4 JOUEURS SPÉCIAUX ======
players.push(
  {rank:10,name:"Kenni",force:rand(96,100),speed:rand(95,100),iq:rand(96,100),tech:rand(90,100),power:rand(95,100),resist:rand(90,100),vital:rand(90,100)},
  {rank:15,name:"Sonya",force:rand(90,95),speed:rand(90,95),iq:rand(90,95),tech:rand(85,95),power:rand(88,95),resist:rand(85,95),vital:rand(85,95)},
  {rank:20,name:"Louis",force:rand(88,93),speed:rand(88,93),iq:rand(88,93),tech:rand(82,90),power:rand(85,92),resist:rand(82,90),vital:rand(82,90)},
  {rank:30,name:"Clara",force:rand(85,91),speed:rand(85,91),iq:rand(88,94),tech:rand(80,88),power:rand(83,90),resist:rand(80,88),vital:rand(82,88)}
);

// ======= GENERATION DES 2000 AUTRES JOUEURS ======
for(let i=1;i<=2000;i++){
  if([10,15,20,30].includes(i)) continue; // on skip les spéciaux
  players.push({
    rank:i,
    name:uniqueName(i),
    force:rand(40,92),
    speed:rand(40,92),
    iq:rand(40,92),
    tech:rand(35,90),
    power:rand(35,92),
    resist:rand(35,90),
    vital:rand(35,90)
  });
}

// ======= TRIER LES JOUEURS PAR RANG INITIAL ======
players.sort((a,b)=>a.rank-b.rank);

// ======= FONCTION DE CALCUL DU TIER ======
function tier(p){
  const avg=(p.force+p.speed+p.iq+p.tech+p.power+p.resist+p.vital)/7;
  if(avg>=98) return 'SSS+';
  if(avg>=95) return 'SSS';
  if(avg>=92) return 'SS+';
  if(avg>=88) return 'SS';
  if(avg>=85) return 'S+';
  if(avg>=80) return 'S';
  if(avg>=75) return 'A';
  if(avg>=60) return 'B';
  return 'C';
}
function tierClass(t){ return t.toLowerCase().replace('+','plus'); }

// ======= RENDER TOP 10 CARDS ======
const topGrid=document.getElementById('topGrid');
function renderTopCards(){
  topGrid.innerHTML='';
  players.slice(0,10).forEach(p=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`
      <div class="rank-big">#${p.rank}</div>
      <h3>${p.name==='Kenni'?'<span class="glitch">ERROR 404</span>':p.name}</h3>
      <p>💪 ${p.force} ⚡ ${p.speed} 🧠 ${p.iq} ✨ ${p.tech} 🔥 ${p.power} 🛡 ${p.resist} ❤️ ${p.vital}</p>
      <div class="stat-bar"><div class="stat-fill force" style="width:${p.force}%"></div></div>
      <div class="stat-bar"><div class="stat-fill speed" style="width:${p.speed}%"></div></div>
      <div class="stat-bar"><div class="stat-fill iq" style="width:${p.iq}%"></div></div>
      <div class="stat-bar"><div class="stat-fill tech" style="width:${p.tech}%"></div></div>
      <div class="stat-bar"><div class="stat-fill power" style="width:${p.power}%"></div></div>
      <div class="stat-bar"><div class="stat-fill resist" style="width:${p.resist}%"></div></div>
      <div class="stat-bar"><div class="stat-fill vital" style="width:${p.vital}%"></div></div>
    `;
    topGrid.appendChild(d);
  });
}
renderTopCards();

// ======= RENDER TABLEAU GLOBAL ======
const tbody=document.getElementById('tbody');
function renderTable(){
  tbody.innerHTML='';
  players.forEach(p=>{
    const tr=document.createElement('tr');
    if([10,15,20,30].includes(p.rank)) tr.classList.add('me-row'); // highlight spéciaux
    tr.innerHTML=`
      <td>${p.rank}</td>
      <td>${p.name==='Kenni'?'<span class="glitch">ERROR 404</span>':p.name}</td>
      <td>${p.force}</td>
      <td>${p.speed}</td>
      <td>${p.iq}</td>
      <td>${p.tech}</td>
      <td>${p.power}</td>
      <td>${p.resist}</td>
      <td>${p.vital}</td>
      <td><span class="badge ${tierClass(tier(p))}">${tier(p)}</span></td>
    `;
    tbody.appendChild(tr);
  });
}
renderTable();

// ======= SEARCH FUNCTION ======
const searchInput=document.getElementById('search');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.toLowerCase();
  tbody.querySelectorAll('tr').forEach(tr=>{
    const name=tr.children[1].textContent.toLowerCase();
    tr.style.display=name.includes(q)?'':'none';
  });
});
    // =================== ANIMATIONS GLOW & PULSATION ===================

// Glow aléatoire sur les top cards
function animateTopCards(){
  const cards=document.querySelectorAll('.top-grid .card');
  cards.forEach(card=>{
    const r=rand(0,255);
    const g=rand(0,255);
    const b=rand(0,255);
    card.style.boxShadow=`0 0 ${rand(15,40)}px rgba(${r},${g},${b},0.8)`;
  });
}

// Animation des barres de stats
function animateStatBars(){
  document.querySelectorAll('.top-grid .card').forEach(card=>{
    card.querySelectorAll('.stat-fill').forEach(bar=>{
      const w=parseInt(bar.style.width)||rand(40,100);
      bar.style.width=Math.min(100,Math.max(40,w+rand(-5,5))+'%');
    });
  });
}

// Glitch aléatoire sur les noms
function randomGlitchEffect(){
  document.querySelectorAll('.top-grid .card h3').forEach(el=>{
    if(Math.random()<0.1){
      el.classList.add('glitch');
      setTimeout(()=>el.classList.remove('glitch'),rand(800,1800));
    }
  });
}

// ======= MISE A JOUR DYNAMIQUE DES RANGS =======
function updateRanksDynamic(){
  players.forEach(p=>{
    // fluctuation aléatoire des stats
    p.force=Math.min(100,Math.max(40,p.force+rand(-3,3)));
    p.speed=Math.min(100,Math.max(40,p.speed+rand(-3,3)));
    p.iq=Math.min(100,Math.max(40,p.iq+rand(-3,3)));
    p.tech=Math.min(100,Math.max(35,p.tech+rand(-3,3)));
    p.power=Math.min(100,Math.max(35,p.power+rand(-3,3)));
    p.resist=Math.min(100,Math.max(35,p.resist+rand(-3,3)));
    p.vital=Math.min(100,Math.max(35,p.vital+rand(-3,3)));
  });

  // tri par tier puis rank
  players.sort((a,b)=>{
    return (tier(b)-tier(a)) || (a.rank-b.rank);
  });

  // re-render top 10 et tableau
  renderTopCards();
  renderTable();

  // animations
  animateTopCards();
  animateStatBars();
  randomGlitchEffect();
}

// ======= HOVER DYNAMIQUE SUR TOP CARDS =======
document.querySelectorAll('.top-grid .card').forEach(card=>{
  card.addEventListener('mouseenter',()=>{
    card.style.transform='scale(1.08) translateY(-10px)';
    card.style.transition='all 0.3s';
    const r=rand(0,255),g=rand(0,255),b=rand(0,255);
    card.style.boxShadow=`0 0 50px rgba(${r},${g},${b},0.9)`;
  });
  card.addEventListener('mouseleave',()=>{
    card.style.transform='scale(1) translateY(0)';
    card.style.transition='all 0.3s';
    card.style.boxShadow='';
  });
});

// ======= LANCER LES ANIMATIONS AUTOMATIQUES =======
setInterval(updateRanksDynamic,120000); // mise à jour toutes les 2 min
setInterval(animateStatBars,5000);      // barres animées toutes les 5 sec
setInterval(randomGlitchEffect,7000);   // glitch aléatoire toutes les 7 sec
setInterval(animateTopCards,6000);      // glow pulsant toutes les 6 sec
