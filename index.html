<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Hunter System Ultimate</title>

<style>
/* ===== BODY & GLOBAL ===== */
body{
  margin:0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background:#02030a;
  color:white;
  overflow-x:hidden;
  position:relative;
}

/* ==== PARTICLES BACKGROUND ==== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, rgba(0,255,255,0.15), transparent),
    radial-gradient(2px 2px at 70% 80%, rgba(255,0,255,0.15), transparent);
  animation: floatBg 30s linear infinite;
  pointer-events:none;
}
@keyframes floatBg{
  from{transform: translateY(0);}
  to{transform: translateY(-300px);}
}

/* ===== HERO HEADER ===== */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}
.hero h1{
  font-size:3.6rem;
  letter-spacing:2px;
  background:linear-gradient(90deg,#00f0ff,#7c3aed,#ff0080);
  -webkit-background-clip:text;
  color:transparent;
  text-shadow:0 0 30px rgba(0,240,255,.6);
  animation: glowPulse 3s infinite alternate;
}
@keyframes glowPulse{
  from{ text-shadow:0 0 10px rgba(0,240,255,.4); }
  to{ text-shadow:0 0 35px rgba(255,0,255,.9); }
}
.hero p{ opacity:.8; font-size:1.2rem; }

/* ===== TOP CARDS ===== */
.top-section{
  padding:20px;
  text-align:center;
}
.top-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:18px;
  margin-top:25px;
}
.card{
  width:200px;
  padding:18px;
  border-radius:18px;
  background:linear-gradient(145deg,#060913,#03050a);
  border:1px solid rgba(0,240,255,.35);
  position:relative;
  overflow:hidden;
  transition:.25s;
}
.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(120deg,transparent,rgba(0,240,255,.5),transparent);
  opacity:0;
  transition:.3s;
}
.card:hover::before{opacity:1;}
.card:hover{
  transform:translateY(-6px) scale(1.05);
  box-shadow:0 0 30px rgba(0,240,255,.6);
}
.rank-big{ font-size:1.4rem; color:#22d3ee; }

/* ===== TABLE ===== */
.board{
  max-width:1200px;
  margin:auto;
  padding:40px 20px 80px;
}
.search{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
  background:#050814;
  color:white;
  margin-bottom:20px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(10,20,40,.5);
  backdrop-filter:blur(6px);
}
th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:center;
}
th{background:rgba(124,58,237,.2);}
.badge{padding:4px 10px;border-radius:999px;font-weight:bold;font-size:.75rem;}
.s{background:#ff2b2b;box-shadow:0 0 10px #ff2b2b;}
.a{background:#7c3aed;}
.b{background:#3b82f6;}
.c{background:#555;}

/* ===== ERROR GLITCH ===== */
.glitch{
  color:#00f0ff;
  position:relative;
  font-weight:bold;
  animation:glitch 1.2s infinite;
}
@keyframes glitch{
  0%{text-shadow:2px 0 red,-2px 0 blue}
  50%{text-shadow:-2px 0 red,2px 0 blue}
  100%{text-shadow:2px 0 red,-2px 0 blue}
}
.me-row{ background:rgba(0,240,255,.12); }

/* ===== STATS HOVER BAR ===== */
.stat-bar{
  height:8px;
  border-radius:6px;
  background:#111;
  margin:6px 0;
}
.stat-fill{
  height:100%;
  border-radius:6px;
  transition:.3s;
}
.force{background:#ff2b2b;}
.speed{background:#3b82f6;}
.iq{background:#7c3aed;}
</style>
</head>
<body>

<header class="hero">
  <h1>⚔️ NEO HUNTER SYSTEM</h1>
  <p>2000 combattants scannés par l'IA - futuriste & élite</p>
</header>

<section class="top-section">
  <h2>🔥 ÉLITE MONDIALE</h2>
  <div class="top-grid" id="topGrid"></div>
</section>

<section class="board">
  <h2>📊 Classement global</h2>
  <input class="search" id="search" placeholder="Scanner un hunter...">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Hunter</th>
        <th>Force</th>
        <th>Vitesse</th>
        <th>IQ</th>
        <th>Tier</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</section>

<script>
// ===== NAMES =====
const p1=["Neo","Dark","Ultra","Shadow","Iron","Cyber","Omega","Alpha","Zero","Nova","Hyper","Quantum","Ghost","Night","Solar"];
const p2=["Blade","Hunter","Rider","Phantom","Titan","Breaker","Striker","Walker","Sniper","Drifter","Runner","Samurai","Knight","Vortex","Specter"];
function uniqueName(id){ return p1[id%p1.length]+p2[(id*7)%p2.length]+"_"+id; }

// ===== PLAYERS =====
const players=[];
function rand(min,max){return Math.floor(Math.random()*(max-min))+min}

// 4 main characters
players.push(
  {rank:10,name:"Kenni",force:rand(96,100),speed:rand(95,100),iq:rand(96,100)},
  {rank:15,name:"Sonya",force:rand(90,95),speed:rand(90,95),iq:rand(90,95)},
  {rank:20,name:"Louis",force:rand(88,93),speed:rand(88,93),iq:rand(88,93)},
  {rank:30,name:"Clara",force:rand(85,91),speed:rand(85,91),iq:rand(88,94)}
);

// generate 2000 players
for(let i=1;i<=2000;i++){
  if([10,15,20,30].includes(i)) continue;
  players.push({rank:i,name:uniqueName(i),force:rand(40,92),speed:rand(40,92),iq:rand(40,92)});
}
players.sort((a,b)=>a.rank-b.rank);

// tier system
function tier(p){
  const avg=(p.force+p.speed+p.iq)/3;
  if(avg>=95) return 'S';
  if(avg>=90) return 'A';
  if(avg>=75) return 'B';
  return 'C';
}

// ===== TOP CARDS =====
const topGrid=document.getElementById('topGrid');
players.slice(0,10).forEach(p=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`
    <div class="rank-big">#${p.rank}</div>
    <h3>${p.name==='Kenni'?'<span class="glitch">ERROR 404</span>':p.name}</h3>
    <p>💪 ${p.force} ⚡ ${p.speed} 🧠 ${p.iq}</p>
    <div class="stat-bar"><div class="stat-fill force" style="width:${p.force}%"></div></div>
    <div class="stat-bar"><div class="stat-fill speed" style="width:${p.speed}%"></div></div>
    <div class="stat-bar"><div class="stat-fill iq" style="width:${p.iq}%"></div></div>
  `;
  topGrid.appendChild(d);
});

// ===== TABLE =====
const tbody=document.getElementById('tbody');
function render(list){
  tbody.innerHTML='';
  list.slice(0,400).forEach(p=>{
    const t=tier(p);
    const tr=document.createElement('tr');
    if(p.name==='Kenni') tr.classList.add('me-row');
    const displayName=p.name==='Kenni'?'<span class="glitch">ERROR 404</span>':p.name;
    tr.innerHTML=`
      <td>${p.rank}</td>
      <td>${displayName}</td>
      <td>${p.force}</td>
      <td>${p.speed}</td>
      <td>${p.iq}</td>
      <td><span class="badge ${t.toLowerCase()}">${t}</span></td>
    `;
    tbody.appendChild(tr);
  });
}
render(players);

// ===== SEARCH =====
document.getElementById('search').addEventListener('input',e=>{
  const v=e.target.value.toLowerCase();
  render(players.filter(p=>p.name.toLowerCase().includes(v)));
});
</script>

</body>
</html>
